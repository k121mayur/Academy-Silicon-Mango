services:
  postgres:
    image: postgres:16-alpine
    container_name: sm_postgres
    environment:
      POSTGRES_DB: silicon_mango
      POSTGRES_USER: sm_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sm_secure_pass_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Postgres listens on 5432 INSIDE the container. Host-exposed on 5435 to avoid
      # colliding with a host-installed Postgres (home-server admin's setup).
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sm_user -d silicon_mango"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm_network

  redis:
    image: redis:7-alpine
    container_name: sm_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-sm_redis_pass_2024}
    ports:
      - "6381:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sm_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./backend/.env
    environment:
      # Inside Docker, connect to the `postgres` service above (NOT host machine).
      # User/password here MUST match POSTGRES_USER/POSTGRES_PASSWORD of postgres service.
      DATABASE_URL: postgresql+asyncpg://sm_user:${DB_PASSWORD:-sm_secure_pass_2024}@postgres:5432/silicon_mango
      REDIS_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/2
    ports:
      - "8090:8085"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/media:/app/media
      - ./backend/app:/app/app
    networks:
      - sm_network

  # ─── Celery worker — encodes pending videos to HLS at midnight ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sm_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sm_user:${DB_PASSWORD:-sm_secure_pass_2024}@postgres:5432/silicon_mango
      REDIS_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/2
    command: celery -A app.celery_app.celery worker -Q encoding --concurrency=1 --loglevel=info
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/media:/app/media
      - ./backend/app:/app/app
    networks:
      - sm_network

  # ─── Celery beat — cron scheduler that fires the nightly encoding task ───
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sm_beat
    depends_on:
      - redis
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sm_user:${DB_PASSWORD:-sm_secure_pass_2024}@postgres:5432/silicon_mango
      REDIS_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-sm_redis_pass_2024}@redis:6379/2
    command: celery -A app.celery_app.celery beat --loglevel=info
    volumes:
      - ./backend/app:/app/app
    networks:
      - sm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sm_frontend
    ports:
      - "5185:80"
    depends_on:
      - backend
    networks:
      - sm_network

volumes:
  pgdata:
  redisdata:

networks:
  sm_network:
    driver: bridge