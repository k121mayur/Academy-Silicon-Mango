name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: self-hosted

    env:
      # Ports 5433/6380 avoid clashing with the dev docker-compose stack
      DATABASE_URL: postgresql+asyncpg://sm_user:sm_secure_pass_2024@localhost:5433/silicon_mango_ci
      REDIS_URL: redis://localhost:6380/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      # Start ephemeral test containers on non-conflicting ports
      - name: Start test Postgres and Redis
        shell: bash
        run: |
          docker run -d --name sm_ci_postgres \
            -e POSTGRES_DB=silicon_mango_ci \
            -e POSTGRES_USER=sm_user \
            -e POSTGRES_PASSWORD=sm_secure_pass_2024 \
            -p 5433:5432 \
            postgres:16-alpine

          docker run -d --name sm_ci_redis \
            -p 6380:6379 \
            redis:7-alpine

          # Wait up to 30 s for Postgres to accept connections
          for i in $(seq 1 30); do
            docker exec sm_ci_postgres pg_isready -U sm_user && break
            sleep 1
          done

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/

      - name: Format check with ruff
        working-directory: backend
        run: ruff format --check app/

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        shell: bash
        run: |
          if [ -d tests ] && [ "$(ls -A tests 2>/dev/null)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — add them under backend/tests/ to enable this step."
          fi

      # Always clean up test containers even if earlier steps fail
      - name: Stop and remove test containers
        if: always()
        shell: bash
        run: |
          docker stop sm_ci_postgres sm_ci_redis 2>/dev/null || true
          docker rm   sm_ci_postgres sm_ci_redis 2>/dev/null || true

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type-check & Build
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Production build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8085
        run: npm run build
