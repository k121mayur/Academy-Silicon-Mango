# ============================================================
#  Silicon Mango Academy — front-door nginx (origin)
#
#  Rendered from /etc/nginx/templates/default.conf.template at container start.
#  Only ${SM_*} variables are substituted (NGINX_ENVSUBST_FILTER=^SM_); nginx
#  runtime variables like $uri, $arg_e, $secure_link are left intact.
#
#  Responsibilities:
#    /api/            → proxy to the FastAPI backend (never cached)
#    /media/seg/...   → signed (secure_link) HLS segments, served from disk,
#                       CDN-cacheable (this is the heavy traffic — zero Python/DB)
#    /uploads/        → public static files served from disk (not via Python)
#    /                → the React single-page app
#
#  TLS termination, Cloudflare origin lock-down, and HTTP→HTTPS redirect live in
#  nginx.prod.conf (mounted by docker-compose.prod.yml on the server).
# ============================================================

server {
    listen 80;
    server_name ${SM_SERVER_NAME};

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the wire — keeps the SPA light on slow connections.
    # (Cloudflare also compresses at the edge; this also covers direct/dev hits.)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript text/javascript
        application/json image/svg+xml application/xml font/ttf font/otf;

    # Allow large multipart video uploads to pass through to the backend, which
    # enforces the real per-file cap. (NOTE: Cloudflare's FREE plan caps request
    # bodies at 100 MB — see DEPLOYMENT.md for uploading larger videos.)
    client_max_body_size 525m;

    # When behind Cloudflare the real visitor IP arrives in CF-Connecting-IP.
    # (The trusted-proxy allow-list that makes this safe is added in the prod
    # override; in local dev there is no Cloudflare so this is simply unused.)
    real_ip_header CF-Connecting-IP;

    # ---- API → FastAPI backend (never cached by the CDN; see CF Cache Rules) ----
    location /api/ {
        # Resolve `backend` at REQUEST time via Docker's embedded DNS (127.0.0.11)
        # rather than at startup. A literal upstream hostname makes nginx ABORT
        # startup with "host not found in upstream backend" whenever the backend
        # container is briefly down/restarting — taking the whole SPA down with
        # it. Using a variable defers resolution, so the front-end always boots
        # and just returns 502 for /api until the backend is back.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream http://backend:8085;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the true client IP for rate-limiting / logging in the app.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_request_buffering off;     # stream big uploads instead of buffering to disk
        # Large video uploads on slow links can take a long time — give them room
        # so the connection isn't dropped mid-transfer (which surfaces as a vague
        # upload failure / token error on the client).
        client_body_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- HLS segments: signed, served from disk, cacheable by the CDN ----
    # Public URL : /media/seg/<inst>/<vid>/<rendition>/seg_NNNNN.ts?e=<exp>&md5=<sig>
    # On disk    : /app/media/videos/<inst>/<vid>/<rendition>/seg_NNNNN.ts  (mounted ro)
    # The signature (secure_link) proves we issued the URL and bounds its life;
    # access control happens at the playlist (login + enrollment + revocation).
    # The regex MUST be quoted — the {5} quantifier's braces would otherwise be
    # parsed by nginx as config block delimiters.
    location ~ "^/media/seg/(?<inst>[^/]+)/(?<vid>[^/]+)/(?<rend>[^/]+)/(?<seg>seg_[0-9]{5}\.ts)$" {
        secure_link        $arg_md5,$arg_e;
        secure_link_md5    "$uri $arg_e ${SM_SEGMENT_SECRET}";

        if ($secure_link = "")  { return 403; }   # forged / tampered signature
        if ($secure_link = "0") { return 410; }   # expired (player refetches playlist)

        alias /app/media/videos/$inst/$vid/$rend/$seg;
        default_type video/mp2t;
        add_header Cache-Control "public, max-age=600, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Accept-Ranges bytes always;
        access_log off;
    }

    # Everything else under /media/ (originals, raw playlists on disk) is private.
    location /media/ { return 404; }

    # ---- Public uploads (course banners, syllabus PDFs, certificates) ----
    # `^~` is REQUIRED: it makes this prefix win over the image-extension regex
    # location further down. Without it, a request like /uploads/banner.jpg
    # matches that regex first and is served from the SPA root (/usr/share/nginx/
    # html) where the file doesn't exist → 404 → broken image in the browser.
    location ^~ /uploads/ {
        alias /app/uploads/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ---- Static assets & React single-page app ----
    # Vite emits content-hashed files under /assets/ (e.g. index-evsHVEsV.js).
    # The hash changes whenever the content changes, so these are safe to cache
    # forever. `^~` makes this prefix win over the file-extension regex below.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Non-fingerprinted static files at the web root (logo, favicon) — moderate cache.
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # SPA entry — never cache the HTML so a new deploy is picked up immediately
    # (the HTML references the latest hashed chunk filenames).
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
