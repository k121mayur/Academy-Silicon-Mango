# ============================================================
#  Silicon Mango Academy — PRODUCTION front-door nginx (Cloudflare origin)
#
#  Mounted over the image's template by docker-compose.prod.yml and rendered at
#  start (only ${SM_*} vars are substituted; $uri/$arg_e/$secure_link survive).
#
#  Security posture:
#    - TLS terminated here with a Cloudflare Origin certificate (Full(strict)).
#    - Authenticated Origin Pulls: only Cloudflare (which presents the origin-pull
#      client cert) can connect — direct-to-IP hits are rejected at the TLS layer.
#    - Real visitor IP recovered from CF-Connecting-IP (trusted CF ranges only).
#    - Optional shared-secret header as a third layer.
#    - Pair this with an Oracle Security List that allows inbound 80/443 ONLY.
# ============================================================

# Trust the X-Forwarded/CF headers ONLY from Cloudflare's published ranges.
# Refresh from https://www.cloudflare.com/ips/ if Cloudflare updates them.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ---- Port 80: redirect everything to HTTPS ----
server {
    listen 80;
    server_name ${SM_SERVER_NAME};
    return 301 https://$host$request_uri;
}

# ---- Port 443: the real server ----
server {
    listen 443 ssl;
    http2 on;
    server_name ${SM_SERVER_NAME};

    # Origin certificate (Cloudflare Origin CA — trusted by Cloudflare in Full(strict)).
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Authenticated Origin Pulls: require Cloudflare's client certificate. This
    # is what blocks anyone who finds the origin IP from bypassing Cloudflare.
    ssl_client_certificate /etc/nginx/certs/cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 525m;   # NOTE: Cloudflare free caps POST bodies at 100MB (see DEPLOYMENT.md)

    # Compress text assets on the wire (Cloudflare also compresses at the edge).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css application/javascript text/javascript
        application/json image/svg+xml application/xml font/ttf font/otf;

    # Third layer: a shared secret added by a Cloudflare Transform Rule. Any
    # request without it (i.e. not via our Cloudflare zone) is rejected.
    if ($http_x_origin_auth != "${SM_ORIGIN_SECRET}") { return 403; }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- API → backend (CDN bypasses this path) ----
    location /api/ {
        # Resolve `backend` at REQUEST time via Docker's embedded DNS (127.0.0.11)
        # rather than at startup, so the front-end still boots if the backend
        # container is briefly down/restarting (a literal upstream hostname makes
        # nginx abort startup with "host not found in upstream backend"). It then
        # just returns 502 for /api until the backend is back.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream http://backend:8085;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_request_buffering off;
        # Large video uploads on slow links can take a long time — give them room
        # so the connection isn't dropped mid-transfer (which surfaces as a vague
        # upload failure / token error on the client).
        client_body_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- HLS segments: signed (secure_link), served from disk, CDN-cacheable ----
    # The regex MUST be quoted — the {5} quantifier's braces would otherwise be
    # parsed by nginx as config block delimiters.
    location ~ "^/media/seg/(?<inst>[^/]+)/(?<vid>[^/]+)/(?<rend>[^/]+)/(?<seg>seg_[0-9]{5}\.ts)$" {
        secure_link        $arg_md5,$arg_e;
        secure_link_md5    "$uri $arg_e ${SM_SEGMENT_SECRET}";

        if ($secure_link = "")  { return 403; }
        if ($secure_link = "0") { return 410; }

        alias /app/media/videos/$inst/$vid/$rend/$seg;
        default_type video/mp2t;
        add_header Cache-Control "public, max-age=600, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Accept-Ranges bytes always;
        access_log off;
    }
    location /media/ { return 404; }

    # ---- Public uploads ----
    # `^~` is REQUIRED so this prefix wins over the image-extension regex below.
    # Without it, /uploads/*.jpg|png|webp|… is hijacked by that regex and served
    # from the SPA root (404 → broken image). PDFs happened to work because they
    # don't match the image regex.
    location ^~ /uploads/ {
        alias /app/uploads/;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ---- Static assets & React SPA ----
    # Content-hashed build output under /assets/ — cache for a year. We use
    # `expires` (NOT add_header) so the server-level security headers above are
    # still inherited — any location with its own add_header would drop them.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
    }

    # Non-fingerprinted root static files (logo, favicon) — moderate cache.
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # SPA entry — always revalidate the HTML so new deploys load immediately.
    location / {
        try_files $uri /index.html;
        expires -1;
    }
}
